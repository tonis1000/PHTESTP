<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔎 Stream Finder</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body{
      margin:0;
      background:#0b0f17;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
    }

    .main{
      display:flex;
      height:100vh;
    }

    .sidebar{
      width:280px;
      min-width:280px;
      background:#111827;
      border-right:1px solid #2a2f3a;
      display:flex;
      flex-direction:column;
    }

    .sidebar-header{
      padding:16px;
      font-size:20px;
      font-weight:bold;
      border-bottom:1px solid #2a2f3a;
    }

    .sidebar-search{
      padding:12px;
      border-bottom:1px solid #2a2f3a;
    }

    .sidebar-search input{
      width:100%;
      box-sizing:border-box;
      padding:10px;
      border-radius:6px;
      border:1px solid #444;
      background:#1f2937;
      color:#fff;
      font-size:14px;
    }

    .channel-list{
      list-style:none;
      margin:0;
      padding:0;
      overflow-y:auto;
      flex:1;
    }

    .channel-list li{
      padding:12px 16px;
      border-bottom:1px solid #1f2937;
      cursor:pointer;
      transition:background .15s ease;
    }

    .channel-list li:hover{
      background:#1f2937;
    }

    .channel-list li.active{
      background:#243041;
      border-left:4px solid #00d4ff;
      padding-left:12px;
    }

    .content{
      flex:1;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .topbar{
      padding:16px 20px;
      border-bottom:1px solid #2a2f3a;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .topbar button{
      background:#1f2937;
      color:#fff;
      border:1px solid #3b4554;
      border-radius:6px;
      padding:10px 14px;
      cursor:pointer;
    }

    .topbar button:hover{
      background:#2a3648;
    }

    .content-inner{
      display:flex;
      flex:1;
      min-height:0;
    }

    .results-panel{
      flex:1;
      padding:20px;
      overflow:auto;
      border-right:1px solid #2a2f3a;
    }

    .player-panel{
      width:42%;
      min-width:380px;
      padding:20px;
      overflow:auto;
    }

    .channel-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .channel-meta{
      color:#b9c0cc;
      margin-bottom:20px;
      font-size:14px;
    }

    .stream-item{
      background:#16202d;
      border:1px solid #273244;
      border-radius:8px;
      padding:12px;
      margin-bottom:12px;
    }

    .stream-url{
      word-break:break-all;
      font-size:13px;
      color:#d6dde8;
      margin-bottom:10px;
    }

    .stream-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .stream-actions button{
      background:#243041;
      color:#fff;
      border:1px solid #3b4554;
      border-radius:6px;
      padding:8px 10px;
      cursor:pointer;
      font-size:13px;
    }

    .stream-actions button:hover{
      background:#314158;
    }

    .badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      margin-right:6px;
      background:#253244;
      color:#dbe6f4;
    }

    .player-title{
      font-size:20px;
      font-weight:bold;
      margin-bottom:12px;
    }

    video{
      width:100%;
      max-height:420px;
      background:#000;
      border-radius:8px;
    }

    .player-status{
      margin-top:12px;
      font-size:14px;
      color:#c5d0dc;
      word-break:break-word;
    }

    .empty-box{
      background:#16202d;
      border:1px dashed #314158;
      border-radius:8px;
      padding:16px;
      color:#aeb9c7;
    }

    @media (max-width: 980px){
      .main{
        flex-direction:column;
        height:auto;
      }

      .sidebar{
        width:100%;
        min-width:0;
        max-height:280px;
      }

      .content-inner{
        flex-direction:column;
      }

      .player-panel{
        width:auto;
        min-width:0;
        border-top:1px solid #2a2f3a;
      }

      .results-panel{
        border-right:none;
      }
    }
  </style>
</head>
<body>

<div class="main">

  <div class="sidebar">
    <div class="sidebar-header">🔎 Stream Finder</div>

    <div class="sidebar-search">
      <input type="text" id="channelFilter" placeholder="Kanal filtern...">
    </div>

    <ul class="channel-list" id="channelList"></ul>
  </div>

  <div class="content">
    <div class="topbar">
      <a href="index.html">
        <button>⬅ WebTV</button>
      </a>
      <button id="reloadChannelsBtn">↻ Reload Channels</button>
    </div>

    <div class="content-inner">
      <div class="results-panel">
        <div id="channelTitle" class="channel-title">Select a channel</div>
        <div id="channelMeta" class="channel-meta">Choose a channel from the sidebar.</div>
        <div id="streamResults"></div>
      </div>

      <div class="player-panel">
        <div class="player-title">▶ Stream Test Player</div>
        <video id="testPlayer" controls></video>
        <div id="playerStatus" class="player-status">No stream loaded.</div>
      </div>
    </div>
  </div>

</div>

<script src="channel-identity.js"></script>

<script>
  let currentChannelKey = null;
  let currentHls = null;

  const demoStreamMap = {
    ert1: [
      "https://ert-ucdn.broadpeak-aas.com/bpk-tv/ERT1/default/index.m3u8",
      "https://cdn4.smart-tv-data.com/vid/ert1/playlist.m3u8"
    ],
    ert2: [
      "https://ert-ucdn.broadpeak-aas.com/bpk-tv/ERT2/default/index.m3u8",
      "https://wow.anixa.tv/live/ert2/playlist.m3u8"
    ],
    ert3: [
      "https://ert-live.ascdn.broadpeak.io/bpk-tv/ERT3/default/index.m3u8",
      "https://ertflix.akamaized.net/ertlive/ert3/clrdef24828n/playlist.m3u8"
    ],
    ertnews: [
      "https://ertflix.akamaized.net/ertlive/ertnews/default/playlist.m3u8"
    ],
    ant1: [
      "https://spark3.smart-tv-data.com/ant1HD/ant1HD/playlist.m3u8",
      "https://cdn1.smart-tv-data.com/live/ant1_srt/playlist.m3u8"
    ],
    alpha: [
      "https://alphatvlive2.siliconweb.com/alphatvlive/live_abr/playlist.m3u8",
      "https://spark3.smart-tv-data.com/alphaHD/alphaHD/playlist.m3u8"
    ],
    skai: [
      "http://skai-live.siliconweb.com/media/cambria4/index.m3u8",
      "https://skai-live-back.siliconweb.com/media/cambria4/index.m3u8"
    ],
    open: [
      "https://liveopencloud.siliconweb.com/1/ZlRza2R6L2tFRnFJ/eWVLSlQx/hls/live/playlist.m3u8",
      "https://liveopen.siliconweb.com/openTvLive/liveopen/playlist.m3u8"
    ],
    mega: [
      "https://www.lakatamia.tv/app/chans/gr/megaimage.php",
      "https://embed.vindral.com/?core.channelId=alteregomedia_megatv1_ci_6cc490c7-e5c6-486b-acf0-9bb9c20fa670&core.minBufferTime=2000&player.aspectRatio=16:9"
    ],
    star: [
      "https://livestar.siliconweb.com/media/star4/star4newhd.m3u8",
      "https://spark3.smart-tv-data.com/starHD/starHD/playlist.m3u8"
    ],
    maktv: [
      "https://spark3.smart-tv-data.com/makHD/makHD/playlist.m3u8"
    ],
    action24: [
      "https://actionlive.siliconweb.com/actionabr/actiontv/playlist.m3u8"
    ],
    pronews: [
      "https://pro.free.hr:3887/live/pronewslive.m3u8"
    ],
    kontra: [
      "https://kontralive.siliconweb.com/live/kontratv/playlist.m3u8"
    ],
    tv100: [
      "https://live.fm100.gr/hls/tv100/1_2/index.m3u8"
    ]
  };

  function destroyCurrentPlayer() {
    if (currentHls) {
      currentHls.destroy();
      currentHls = null;
    }

    const video = document.getElementById("testPlayer");
    video.pause();
    video.removeAttribute("src");
    video.load();
  }

  function setPlayerStatus(text) {
    document.getElementById("playerStatus").textContent = text;
  }

  function playTest(url) {
    const video = document.getElementById("testPlayer");
    destroyCurrentPlayer();

    setPlayerStatus("Loading: " + url);

    if (/\.m3u8(\?.*)?$/i.test(url)) {
      if (window.Hls && Hls.isSupported()) {
        currentHls = new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(video);

        currentHls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play().catch(() => {});
          setPlayerStatus("Playing with Hls.js: " + url);
        });

        currentHls.on(Hls.Events.ERROR, function (event, data) {
          setPlayerStatus("HLS error: " + (data && data.details ? data.details : "unknown"));
        });
      } else {
        video.src = url;
        video.play().catch(() => {});
        setPlayerStatus("Playing natively: " + url);
      }
    } else {
      video.src = url;
      video.play().catch(() => {});
      setPlayerStatus("Trying direct playback: " + url);
    }
  }

  function copyUrl(url) {
    navigator.clipboard.writeText(url).then(() => {
      setPlayerStatus("Copied URL: " + url);
    }).catch(() => {
      setPlayerStatus("Copy failed.");
    });
  }

  function renderChannelList(filterText = "") {
    const list = document.getElementById("channelList");
    list.innerHTML = "";

    const keys = Object.keys(channelIdentityMap).sort();

    keys.forEach(key => {
      const channel = channelIdentityMap[key];
      const haystack = [
        key,
        channel.displayName || "",
        ...(channel.aliases || [])
      ].join(" ").toLowerCase();

      if (filterText && !haystack.includes(filterText.toLowerCase())) {
        return;
      }

      const li = document.createElement("li");
      li.textContent = channel.displayName || key;
      li.dataset.key = key;

      if (currentChannelKey === key) {
        li.classList.add("active");
      }

      li.addEventListener("click", () => {
        currentChannelKey = key;
        renderChannelList(document.getElementById("channelFilter").value.trim());
        renderChannelDetails(key);
      });

      list.appendChild(li);
    });
  }

  function renderChannelDetails(key) {
    const channel = channelIdentityMap[key];
    const results = document.getElementById("streamResults");

    document.getElementById("channelTitle").textContent =
      `${channel.displayName || key} (${key})`;

    document.getElementById("channelMeta").textContent =
      `Aliases: ${(channel.aliases || []).join(", ")} | TVG IDs: ${(channel.tvgIds || []).join(", ")}`;

    results.innerHTML = "";

    const streams = demoStreamMap[key] || [];

    if (!streams.length) {
      results.innerHTML = `
        <div class="empty-box">
          No stream sources added yet for this channel.<br>
          This is where GitHub discovery / validation results will appear next.
        </div>
      `;
      return;
    }

    streams.forEach((url, index) => {
      const item = document.createElement("div");
      item.className = "stream-item";

      item.innerHTML = `
        <div style="margin-bottom:8px;">
          <span class="badge">Source ${index + 1}</span>
          <span class="badge">${/\.m3u8(\?.*)?$/i.test(url) ? "HLS" : "Direct"}</span>
        </div>
        <div class="stream-url">${url}</div>
        <div class="stream-actions">
          <button data-action="test">▶ Test Stream</button>
          <button data-action="copy">⧉ Copy URL</button>
        </div>
      `;

      item.querySelector('[data-action="test"]').addEventListener("click", () => {
        playTest(url);
      });

      item.querySelector('[data-action="copy"]').addEventListener("click", () => {
        copyUrl(url);
      });

      results.appendChild(item);
    });
  }

  document.getElementById("channelFilter").addEventListener("input", function () {
    renderChannelList(this.value.trim());
  });

  document.getElementById("reloadChannelsBtn").addEventListener("click", function () {
    renderChannelList(document.getElementById("channelFilter").value.trim());
    setPlayerStatus("Channel list reloaded.");
  });

  renderChannelList();
</script>

</body>
</html>
