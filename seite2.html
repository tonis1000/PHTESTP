<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔎 Stream Finder</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body{
      margin:0;
      background:#0b0f17;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
    }

    .main{
      display:flex;
      height:100vh;
    }

    .sidebar{
      width:280px;
      min-width:280px;
      background:#111827;
      border-right:1px solid #2a2f3a;
      display:flex;
      flex-direction:column;
    }

    .sidebar-header{
      padding:16px;
      font-size:20px;
      font-weight:bold;
      border-bottom:1px solid #2a2f3a;
    }

    .sidebar-search{
      padding:12px;
      border-bottom:1px solid #2a2f3a;
    }

    .sidebar-search input{
      width:100%;
      box-sizing:border-box;
      padding:10px;
      border-radius:6px;
      border:1px solid #444;
      background:#1f2937;
      color:#fff;
      font-size:14px;
    }

    .channel-list{
      list-style:none;
      margin:0;
      padding:0;
      overflow-y:auto;
      flex:1;
    }

    .channel-list li{
      padding:12px 16px;
      border-bottom:1px solid #1f2937;
      cursor:pointer;
      transition:background .15s ease;
    }

    .channel-list li:hover{
      background:#1f2937;
    }

    .channel-list li.active{
      background:#243041;
      border-left:4px solid #00d4ff;
      padding-left:12px;
    }

    .content{
      flex:1;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .topbar{
      padding:16px 20px;
      border-bottom:1px solid #2a2f3a;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .topbar button{
      background:#1f2937;
      color:#fff;
      border:1px solid #3b4554;
      border-radius:6px;
      padding:10px 14px;
      cursor:pointer;
    }

    .topbar button:hover{
      background:#2a3648;
    }

    .content-inner{
      display:flex;
      flex:1;
      min-height:0;
    }

    .results-panel{
      flex:1;
      padding:20px;
      overflow:auto;
      border-right:1px solid #2a2f3a;
    }

    .player-panel{
      width:42%;
      min-width:380px;
      padding:20px;
      overflow:auto;
    }

    .channel-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .channel-meta{
      color:#b9c0cc;
      margin-bottom:20px;
      font-size:14px;
    }

    .stream-item{
      background:#16202d;
      border:1px solid #273244;
      border-radius:8px;
      padding:12px;
      margin-bottom:12px;
    }

    .stream-url{
      word-break:break-all;
      font-size:13px;
      color:#d6dde8;
      margin-bottom:10px;
    }

    .stream-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .stream-actions button{
      background:#243041;
      color:#fff;
      border:1px solid #3b4554;
      border-radius:6px;
      padding:8px 10px;
      cursor:pointer;
      font-size:13px;
    }

    .stream-actions button:hover{
      background:#314158;
    }

    .badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      margin-right:6px;
      background:#253244;
      color:#dbe6f4;
    }

    .badge-status-checking{
      background:#5a4a18;
      color:#ffe8a3;
    }

    .badge-status-online{
      background:#1f5131;
      color:#d8ffe3;
    }

    .badge-status-dead{
      background:#5a1e1e;
      color:#ffd8d8;
    }

    .player-title{
      font-size:20px;
      font-weight:bold;
      margin-bottom:12px;
    }

    video{
      width:100%;
      max-height:420px;
      background:#000;
      border-radius:8px;
    }

    .player-status{
      margin-top:12px;
      font-size:14px;
      color:#c5d0dc;
      word-break:break-word;
    }

    .empty-box{
      background:#16202d;
      border:1px dashed #314158;
      border-radius:8px;
      padding:16px;
      color:#aeb9c7;
    }

    @media (max-width: 980px){
      .main{
        flex-direction:column;
        height:auto;
      }

      .sidebar{
        width:100%;
        min-width:0;
        max-height:280px;
      }

      .content-inner{
        flex-direction:column;
      }

      .player-panel{
        width:auto;
        min-width:0;
        border-top:1px solid #2a2f3a;
      }

      .results-panel{
        border-right:none;
      }
    }
  </style>
</head>
<body>

<div class="main">

  <div class="sidebar">
    <div class="sidebar-header">🔎 Stream Finder</div>

    <div class="sidebar-search">
      <input type="text" id="channelFilter" placeholder="Kanal filtern...">
    </div>

    <ul class="channel-list" id="channelList"></ul>
  </div>

  <div class="content">
    <div class="topbar">
      <a href="index.html">
        <button>⬅ WebTV</button>
      </a>
      <button id="reloadChannelsBtn">↻ Reload Channels</button>
    </div>

    <div class="content-inner">
      <div class="results-panel">
        <div id="channelTitle" class="channel-title">Select a channel</div>
        <div id="channelMeta" class="channel-meta">Choose a channel from the sidebar.</div>
        <div id="streamResults"></div>
      </div>

      <div class="player-panel">
        <div class="player-title">▶ Stream Test Player</div>
        <video id="testPlayer" controls></video>
        <div id="playerStatus" class="player-status">No stream loaded.</div>
      </div>
    </div>
  </div>

</div>

<script src="channel-identity.js"></script>
<script src="stream-finder-sources.js"></script>

<script>
  let currentChannelKey = null;
  let currentHls = null;

  function destroyCurrentPlayer() {
    if (currentHls) {
      currentHls.destroy();
      currentHls = null;
    }

    const video = document.getElementById("testPlayer");
    video.pause();
    video.removeAttribute("src");
    video.load();
  }

  function setPlayerStatus(text) {
    document.getElementById("playerStatus").textContent = text;
  }

  function playTest(url) {
    const video = document.getElementById("testPlayer");
    destroyCurrentPlayer();

    setPlayerStatus("Loading: " + url);

    if (/\.m3u8(\?.*)?$/i.test(url)) {
      if (window.Hls && Hls.isSupported()) {
        currentHls = new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(video);

        currentHls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play().catch(() => {});
          setPlayerStatus("Playing with Hls.js: " + url);
        });

        currentHls.on(Hls.Events.ERROR, function (event, data) {
          setPlayerStatus("HLS error: " + (data && data.details ? data.details : "unknown"));
        });
      } else {
        video.src = url;
        video.play().catch(() => {});
        setPlayerStatus("Playing natively: " + url);
      }
    } else {
      video.src = url;
      video.play().catch(() => {});
      setPlayerStatus("Trying direct playback: " + url);
    }
  }

  function copyUrl(url) {
    navigator.clipboard.writeText(url).then(() => {
      setPlayerStatus("Copied URL: " + url);
    }).catch(() => {
      setPlayerStatus("Copy failed.");
    });
  }

  async function checkStreamStatus(url, badge) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 5000);

      await fetch(url, {
        method: "HEAD",
        mode: "no-cors",
        signal: controller.signal
      });

      clearTimeout(timeout);

      badge.textContent = "✅ online";
      badge.classList.remove("badge-status-checking", "badge-status-dead");
      badge.classList.add("badge-status-online");
    } catch (e) {
      badge.textContent = "❌ dead";
      badge.classList.remove("badge-status-checking", "badge-status-online");
      badge.classList.add("badge-status-dead");
    }
  }

  function renderChannelList(filterText = "") {
    const list = document.getElementById("channelList");
    list.innerHTML = "";

    const keys = Object.keys(channelIdentityMap).sort();

    keys.forEach(key => {
      const channel = channelIdentityMap[key];
      const haystack = [
        key,
        channel.displayName || "",
        ...(channel.aliases || [])
      ].join(" ").toLowerCase();

      if (filterText && !haystack.includes(filterText.toLowerCase())) {
        return;
      }

      const li = document.createElement("li");
      li.textContent = channel.displayName || key;
      li.dataset.key = key;

      if (currentChannelKey === key) {
        li.classList.add("active");
      }

      li.addEventListener("click", () => {
        currentChannelKey = key;
        renderChannelList(document.getElementById("channelFilter").value.trim());
        renderChannelDetails(key);
      });

      list.appendChild(li);
    });
  }

function renderChannelDetails(key) {
  const channel = channelIdentityMap[key];
  const results = document.getElementById("streamResults");

  document.getElementById("channelTitle").textContent =
    `${channel.displayName || key} (${key})`;

  document.getElementById("channelMeta").textContent =
    `Aliases: ${(channel.aliases || []).join(", ")} | TVG IDs: ${(channel.tvgIds || []).join(", ")}`;

  results.innerHTML = "";

  sortStreamFinderSources(key);
  const sources = getStreamFinderSources(key);

  if (!sources.length) {
    results.innerHTML = `
      <div class="empty-box">
        No stream sources added yet for this channel.<br>
        This is where GitHub discovery / validation results will appear next.
      </div>
    `;
    return;
  }

  sources.forEach((source, index) => {
    const url = source.url;

    const item = document.createElement("div");
    item.className = "stream-item";

    item.innerHTML = `
      <div style="margin-bottom:8px;">
        <span class="badge">Source ${index + 1}</span>
        <span class="badge">${/\.m3u8(\?.*)?$/i.test(url) ? "HLS" : "Direct"}</span>
        <span class="badge">${source.sourceType || "saved"}</span>
        <span class="badge status-badge badge-status-checking" data-url="${url}">
          ${source.status === "online" ? "✅ online" : source.status === "dead" ? "❌ dead" : "⏳ checking"}
        </span>
      </div>
      <div class="stream-url">${url}</div>
      <div style="font-size:12px; color:#aeb9c7; margin-bottom:8px;">
        ${source.notes || ""}
      </div>
      <div class="stream-actions">
        <button data-action="test">▶ Test Stream</button>
        <button data-action="copy">⧉ Copy URL</button>
      </div>
    `;

    item.querySelector('[data-action="test"]').addEventListener("click", () => {
      playTest(url);
    });

    item.querySelector('[data-action="copy"]').addEventListener("click", () => {
      copyUrl(url);
    });

    const badge = item.querySelector(".status-badge");
    checkStreamStatus(url, badge);

    results.appendChild(item);
  });
}

  document.getElementById("channelFilter").addEventListener("input", function () {
    renderChannelList(this.value.trim());
  });

  document.getElementById("reloadChannelsBtn").addEventListener("click", function () {
    renderChannelList(document.getElementById("channelFilter").value.trim());
    setPlayerStatus("Channel list reloaded.");
  });

  renderChannelList();
</script>

</body>
</html>
