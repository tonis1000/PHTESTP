<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Finder</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #222;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .finder-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .finder-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .finder-bar input,
    .finder-bar select,
    .finder-bar button {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #666;
      font-size: 15px;
    }

    .finder-bar input {
      flex: 1;
      background: #333;
      color: #fff;
    }

    .finder-bar button {
      background: #0d6efd;
      color: #fff;
      cursor: pointer;
    }

    .finder-bar button:hover {
      background: #0b5ed7;
    }

    .results {
      display: grid;
      gap: 12px;
    }

    .result-card {
      background: #333;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 12px;
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .result-url {
      word-break: break-all;
      color: #9ad0ff;
      font-size: 14px;
    }

    .result-meta {
      font-size: 13px;
      color: #ddd;
      margin-top: 6px;
    }

    .result-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-ok { color: #7CFC00; }
    .status-bad { color: #ff6b6b; }

    .top-links {
      margin-bottom: 18px;
    }

    .top-links a {
      color: #9ad0ff;
      text-decoration: none;
      margin-right: 15px;
    }
  </style>
</head>
<body>
  <div class="finder-wrap">
    <div class="top-links">
      <a href="index.html">⬅ Zurück zum Player</a>
    </div>

    <h1>🔎 Stream Finder</h1>

    <div class="finder-bar">
      <input id="finder-query" type="text" placeholder="π.χ. ant1, mega, ert1, mak tv">
      <select id="finder-mode">
        <option value="channel">Kanal</option>
        <option value="raw">Raw Suche</option>
      </select>
      <button id="finder-search-btn">Find</button>
    </div>

    <div id="finder-status"></div>
    <div id="finder-results" class="results"></div>
  </div>

  <script src="stream-finder-sources.js"></script>
  <script src="stream-finder.js"></script>
</body>
</html>
